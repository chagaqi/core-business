document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 23 T30 23\" stroke=\"#0E5366\" stroke-width=\"2.1\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M5 17 Q11 12 16 17 T27 17\" stroke=\"#0E5366\" stroke-width=\"2.1\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.6\"><\u002Fpath><path d=\"M8 11 Q12.5 7 16 11 T24 11\" stroke=\"#0E5366\" stroke-width=\"2.1\" fill=\"none\" stroke-linecap=\"round\" opacity=\"0.34\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;font-size:22px;font-weight:600;letter-spacing:-0.01em\">Tideover<\u002Fspan>\n      <\u002Fa>\n      <div style=\"display:flex;align-items:center;gap:8px;flex-wrap:wrap\">\n        <a href=\"#wait\" style=\"text-decoration:none;color:#314548;font-size:15px;font-weight:500;padding:8px 12px;border-radius:999px;transition:color .15s,background .15s\" style-hover=\"color:#0E5366;background:#EFE7D7\">The long wait<\u002Fa>\n        <a href=\"#how\" style=\"text-decoration:none;color:#314548;font-size:15px;font-weight:500;padding:8px 12px;border-radius:999px;transition:color .15s,background .15s\" style-hover=\"color:#0E5366;background:#EFE7D7\">How it works<\u002Fa>\n        <a href=\"#pilot\" style=\"text-decoration:none;color:#314548;font-size:15px;font-weight:500;padding:8px 12px;border-radius:999px;transition:color .15s,background .15s\" style-hover=\"color:#0E5366;background:#EFE7D7\">The pilot<\u002Fa>\n        <a href=\"#faq\" style=\"text-decoration:none;color:#314548;font-size:15px;font-weight:500;padding:8px 12px;border-radius:999px;transition:color .15s,background .15s\" style-hover=\"color:#0E5366;background:#EFE7D7\">FAQ<\u002Fa>\n        <a href=\"{{ book_call }}\" style=\"display:inline-flex;align-items:center;gap:7px;background:linear-gradient(135deg,#E0833D 0%,#C25C29 100%);color:#FFF6EE;font-size:15px;font-weight:600;padding:11px 21px;border-radius:999px;text-decoration:none;box-shadow:0 8px 20px rgba(194,92,41,0.40),0 2px 5px rgba(194,92,41,0.28);transition:background .2s,transform .2s,box-shadow .2s\" style-hover=\"background:linear-gradient(135deg,#EF9249 0%,#D2682F 100%);transform:translateY(-2px);box-shadow:0 14px 30px rgba(194,92,41,0.5)\">Free teardown<span aria-hidden=\"true\" style=\"font-size:1.05em;line-height:1\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fnav>\n\n  <main id=\"main\">\n\n  <!-- ============ HERO ============ -->\n  <header style=\"position:relative;background:radial-gradient(120% 80% at 82% -10%, rgba(217,118,47,0.18), transparent 58%), radial-gradient(120% 95% at 8% 8%, rgba(15,84,104,0.17), transparent 56%), linear-gradient(180deg,#FBF8F2 0%,#F4ECDA 100%)\">\n    <div style=\"max-width:1180px;margin:0 auto;padding:clamp(48px,7vw,92px) 22px clamp(56px,8vw,104px);display:flex;flex-wrap:wrap;gap:clamp(36px,5vw,64px);align-items:center\">\n\n      <!-- left -->\n      <div style=\"flex:1 1 420px;min-width:300px\">\n        <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-bottom:26px\">\n          <span style=\"display:inline-flex;align-items:center;gap:8px;background:#E4EEF0;color:#0E5366;font-size:13px;font-weight:600;padding:8px 14px;border-radius:999px;border:1px solid #D2E2E4\">For 60–120 day presale waits<\u002Fspan>\n          <span style=\"display:inline-flex;align-items:center;gap:8px;background:#E4EEF0;color:#0E5366;font-size:13px;font-weight:600;padding:8px 14px;border-radius:999px;border:1px solid #D2E2E4\">Built for Kickstarter &amp; BackerKit graduates<\u002Fspan>\n        <\u002Fdiv>\n\n        <h1 style=\"font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;font-weight:600;font-size:clamp(34px,5.2vw,56px);line-height:1.08;letter-spacing:-0.015em;color:#11252A;margin:0 0 22px;text-wrap:balance\">Calm the wait. Keep the sale.<\u002Fh1>\n\n        <p style=\"font-size:clamp(17px,1.5vw,19px);line-height:1.65;color:#374A4F;max-width:560px;margin:0 0 30px\">Tideover plugs into the Gorgias, Tidio, or Intercom you already use, knows each order's real production timeline, and answers the long wait with calm, human, timeline-aware reassurance — so \"where's my order?\" doesn't become a refund.<\u002Fp>\n\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;gap:18px;margin-bottom:28px\">\n          <a href=\"{{ book_call }}\" style=\"display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#E0833D 0%,#C25C29 100%);color:#FFF6EE;font-size:17px;font-weight:600;padding:16px 32px;border-radius:999px;text-decoration:none;box-shadow:0 14px 32px rgba(194,92,41,0.42),0 3px 8px rgba(194,92,41,0.3);transition:background .2s,transform .2s,box-shadow .2s\" style-hover=\"background:linear-gradient(135deg,#EF9249 0%,#D2682F 100%);transform:translateY(-2px);box-shadow:0 20px 44px rgba(194,92,41,0.52)\">Get a free 15-min presale-support teardown<span aria-hidden=\"true\" style=\"font-size:1.1em;line-height:1\">→<\u002Fspan><\u002Fa>\n          <a href=\"#how\" style=\"display:inline-flex;align-items:center;gap:7px;color:#0E5366;font-size:16px;font-weight:600;text-decoration:none\" style-hover=\"gap:11px\"><span style=\"border-bottom:1.5px solid rgba(31,91,107,0.35);padding-bottom:1px\">See how it works<\u002Fspan><span aria-hidden=\"true\">→<\u002Fspan><\u002Fa>\n        <\u002Fdiv>\n\n        <div style=\"display:flex;gap:13px;align-items:flex-start;background:#FFFFFF;border:1px solid #EBE2D0;border-radius:16px;padding:16px 18px;max-width:540px;box-shadow:0 8px 24px rgba(31,91,107,0.06)\">\n          <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\" style=\"flex:none;margin-top:1px\"><path d=\"M12 2 4 6v6c0 4.4 3.2 7.6 8 10 4.8-2.4 8-5.6 8-10V6l-8-4Z\" stroke=\"{{ accent }}\" stroke-width=\"1.7\" fill=\"rgba(201,122,74,0.08)\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M9 12l2 2 4-4.5\" stroke=\"{{ accent }}\" stroke-width=\"1.7\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n          <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:#374A4F\"><strong style=\"color:#11252A\">No new helpdesk to install.<\u002Fstrong> Nothing to rip out. We work inside the tools you already have.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- right: reassurance reply card -->\n      <div style=\"flex:1 1 380px;min-width:290px\">\n        <div style=\"background:#FFFFFF;border:1px solid #EBE2D0;border-radius:24px;box-shadow:0 24px 60px rgba(31,91,107,0.12);overflow:hidden;animation:tideDrift 9s ease-in-out infinite\">\n          <div style=\"display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 20px;background:#F3F8F8;border-bottom:1px solid #E4EEF0\">\n            <div style=\"display:flex;align-items:center;gap:10px\">\n              <span style=\"width:34px;height:34px;border-radius:50%;background:#E4EEF0;display:flex;align-items:center;justify-content:center;color:#0E5366;font-weight:700;font-size:14px\">D<\u002Fspan>\n              <div style=\"line-height:1.2\"><div style=\"font-weight:600;font-size:14px;color:#11252A\">Dana — order #4821<\u002Fdiv><div style=\"font-size:12px;color:#6B7C80\">Presale · backer pledge<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <span style=\"font-size:12px;font-weight:600;color:#0E5366;background:#E4EEF0;padding:5px 11px;border-radius:999px;border:1px solid #D2E2E4\">Day 58<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:22px 20px;display:flex;flex-direction:column;gap:16px\">\n            <div style=\"align-self:flex-start;max-width:88%;background:#F1ECE0;color:#314548;border-radius:16px 16px 16px 4px;padding:13px 16px;font-size:14.5px;line-height:1.55\">I ordered back in March and it's been almost two months. Starting to wonder if this is actually coming, or if I should just ask for a refund.<\u002Fdiv>\n            <div style=\"align-self:flex-end;max-width:90%;background:#0E5366;color:#F4F9F9;border-radius:16px 16px 4px 16px;padding:14px 16px;font-size:14.5px;line-height:1.58\">Hey Dana — totally fair to wonder after this long, and I'm really glad you reached out. Your order's in the production batch that's <strong style=\"color:#fff\">currently tracking to ship late July<\u002Fstrong>. You're on the list and nothing's stuck. I'll check back in the moment anything shifts.<\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:8px;align-self:flex-end;color:#8A7A66;font-size:11.5px;font-weight:500\">\n              <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M12 2 4 6v6c0 4.4 3.2 7.6 8 10 4.8-2.4 8-5.6 8-10V6l-8-4Z\" stroke=\"{{ accent }}\" stroke-width=\"1.8\" fill=\"none\"><\u002Fpath><\u002Fsvg>\n              timeline-aware · human-approved · no hard date promised\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ THE LONG WAIT ============ -->\n  <section id=\"wait\" style=\"max-width:1180px;margin:0 auto;padding:clamp(56px,8vw,104px) 22px\">\n    <div style=\"max-width:680px;margin-bottom:48px\">\n      <div style=\"text-transform:uppercase;letter-spacing:0.14em;font-size:13px;font-weight:700;color:{{ accent }};margin-bottom:14px\">The long wait<\u002Fdiv>\n      <h2 style=\"font-family:'Iowan Old Style','Palatino Linotype',Palatino,Georgia,serif;font-weight:600;font-size:clamp(28px,3.6vw,40px);line-height:1.14;letter-spacing:-0.01em;color:#11252A;margin:0 0 16px;text-wrap:balance\">It isn't one ticket. It's a months-long emotional journey.<\u002Fh2>\n      <p style=\"font-size:17px;line-height:1.65;color:#374A4F;margin:0\">You collected the cash today and ship in 60 to 120 days. In that gap a confident buyer slowly turns into an anxious one — and an anxious one turns into a refund request.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- timeline -->\n    <ol style=\"list-style:none;margin:0 0 56px;padding:0;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px\">\n      <li style=\"background:#FFFFFF;border:1px solid #EBE2D0;border-radius:18px;padding:22px;box-shadow:0 10px 28px rgba(31,91,107,0.05)\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px\"><span style=\"width:12px;height:12px;border-radius:50%;background:#7FB0A6\"><\u002Fspan><span style=\"font-weight:700;font-size:13px;letter-spacing:0.05em;color:#0E5366\">DAY 7<\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:20px;font-weight:600;color:#11252A;margin:0 0 7px\">Still excited<\u002Fh3>\n        <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:#46585C\">The confirmation-email glow. They tell friends. No questions yet.<\u002Fp>\n      <\u002Fli>\n      <li style=\"background:#FFFFFF;border:1px solid #EBE2D0;border-radius:18px;padding:22px;box-shadow:0 10px 28px rgba(31,91,107,0.05)\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px\"><span style=\"width:12px;height:12px;border-radius:50%;background:#E1C07A\"><\u002Fspan><span style=\"font-weight:700;font-size:13px;letter-spacing:0.05em;color:#0E5366\">DAY 30<\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:20px;font-weight:600;color:#11252A;margin:0 0 7px\">First doubt<\u002Fh3>\n        <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:#46585C\">The excitement fades. \"Wait — when is this actually coming?\"<\u002Fp>\n      <\u002Fli>\n      <li style=\"background:#FFFFFF;border:1px solid #EBE2D0;border-radius:18px;padding:22px;box-shadow:0 10px 28px rgba(31,91,107,0.05)\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px\"><span style=\"width:12px;height:12px;border-radius:50%;background:#D89A6A\"><\u002Fspan><span style=\"font-weight:700;font-size:13px;letter-spacing:0.05em;color:#0E5366\">DAY 60<\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:20px;font-weight:600;color:#11252A;margin:0 0 7px\">Anxious<\u002Fh3>\n        <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:#46585C\">No update in weeks. They Google your name with \"scam\" and start screenshotting.<\u002Fp>\n      <\u002Fli>\n      <li style=\"background:#FFFFFF;border:1px solid #E7CFC0;border-radius:18px;padding:22px;box-shadow:0 10px 28px rgba(201,122,74,0.08)\">\n        <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:12px\"><span style=\"width:12px;height:12px;border-radius:50%;background:#C0603A\"><\u002Fspan><span style=\"font-weight:700;font-size:13px;letter-spacing:0.05em;color:#B05A30\">DAY 89<\u002Fspan><\u002Fdiv>\n        <h3 style=\"font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:20px;font-weight:600;color:#11252A;margin:0 0 7px\">Ready to bail<\u002Fh3>\n        <p style=\"margin:0;font-size:14.5px;line-height:1.55;color:#46585C\">One unanswered message away from a refund request — or a chargeback.<\u002Fp>\n      <\u002Fli>\n    <\u002Fol>\n\n    <!-- stakes -->\n    <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px\">\n      <div style=\"background:#FBF6EC;border:1px solid #EBE2D0;border-radius:18px;padding:26px\">\n        <h3 style=\"font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:20px;font-weight:600;color:#11252A;margin:0 0 10px\">Chargebacks hit more than revenue<\u002Fh3>\n        <p style=\"margin:0;font-size:15px;line-height:1.6;color:#46585C\">A refund is a lost sale. A chargeback is a dispute on your record — and enough of them put your Stripe or PayPal standing at risk.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#FBF6EC;border:1px solid #EBE2D0;border-radius:18px;padding:26px\">\n        <h3 style=\"font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:20px;font-weight:600;color:#11252A;margin:0 0 10px\">WISMO floods px rgba(31,91,107,0.05)\">\n          <span style=\"display:inline-flex;width:40px;height:40px;border-radius:11px;background:#E4EEF0;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><rect x=\"3\" y=\"4\" width=\"8\" height=\"7\" rx=\"2\" stroke=\"#0E5366\" stroke-width=\"1.7\"><\u002Frect><rect x=\"13\" y=\"13\" width=\"8\" height=\"7\" rx=\"2\" stroke=\"#0E5366\" stroke-width=\"1.7\"><\u002Frect><path d=\"M11 7.5h4a2 2 0 0 1 2 2V13\" stroke=\"#0E5366\" stroke-width=\"1.7\" fill=\"none\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <h3 style=\"font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:19px;font-weight:600;color:#11252A;margin:0 0 8px\">Plugs into your existing stack<\u002Fh3>\n          <p style=\"margin:0;font-size:14.5px;line-height:1.58;color:#46585C\">We bolt onto the Gorgias, Tidio, or Intercom you already run. No migration, no second inbox, no infra change.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF;border:1px solid #EBE2D0;border-radius:18px;padding:26px;box-shadow:0 10px 28px rgba(31,91,107,0.05)\">\n          <span style=\"display:inline-flex;width:40px;height:40px;border-radius:11px;background:#E4EEF0;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><circle cx=\"12\" cy=\"12\" r=\"9\" stroke=\"#0E5366\" stroke-width=\"1.7\"><\u002Fcircle><path d=\"M12 7v5l3.5 2\" stroke=\"#0E5366\" stroke-width=\"1.7\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <h3 style=\"font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:19px;font-weight:600;color:#11252A;margin:0 0 8px\">Knows each order's real timeline<\u002Fh3>\n          <p style=\"margin:0;font-size:14.5px;line-height:1.58;color:#46585C\">Tideover reads order data and your production schedule, so every reply is grounded in where that specific order actually is.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF;border:1px solid #EBE2D0;border-radius:18px;padding:26px;box-shadow:0 10px 28px rgba(31,91,107,0.05)\">\n          <span style=\"display:inline-flex;width:40px;height:40px;border-radius:11px;background:#E4EEF0;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><path d=\"M4 5h16v11H8l-4 3V5Z\" stroke=\"#0E5366\" stroke-width=\"1.7\" fill=\"none\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M8 10h8M8 13h5\" stroke=\"#0E5366\" stroke-width=\"1.7\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <h3 style=\"font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:19px;font-weight:600;color:#11252A;margin:0 0 8px\">Timeline-aware, day-stage replies<\u002Fh3>\n          <p style=\"margin:0;font-size:14.5px;line-height:1.58;color:#46585C\">A Day 20 nudge and a Day 80 worry need different words. Replies meet the buyer at the emotional stage they're in.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:#FFFFFF;border:1px solid #EBE2D0;border-radius:18px;padding:26px;box-shadow:0 10px 28px rgba(31,91,107,0.05)\">\n          <span style=\"display:inline-flex;width:40px;height:40px;border-radius:11px;background:#E4EEF0;align-items:center;justify-content:center;margin-bottom:16px\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" aria-hidden=\"true\"><circle cx=\"12\" cy=\"8\" r=\"3.4\" stroke=\"#0E5366\" stroke-width=\"1.7\"><\u002Fcircle><path d=\"M5.5 19.5a6.5 6.5 0 0 1 13 0\" stroke=\"#0E5366\" stroke-width=\"1.7\" fill=\"none\" stroke-linecap=\"round\"><\u002Fpath><path d=\"M16.5 8.5l1.6 1.6 2.4-2.6\" stroke=\"{{ accent }}\" stroke-width=\"1.7\" fill=\"none\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <h3 style=\"font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:19px;font-weight:600;color:#11252A;margin:0 0 8px\">Every novel reply is human-approved<\u002Fh3>\n          <p style=\"margin:0;font-size:14.5px;line-height:1.58;color:#46585C\">Nothing auto-fires a promise. New situations get a real person's eyes before they ever reach your customer.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- diagram -->\n      <div style=\"background:#FFFFFF;border:1px solid #EBE2D0;border-radius:22px;padding:clamp(24px,4vw,40px);box-shadow:0 16px 40px rgba(31,91,107,0.07);margin-bottom:44px\">\n        <div style=\"text-align:center;font-size:13px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#8A9A9D;margin-bottom:28px\">How the bolt-on routes<\u002Fdiv>\n        <div style=\"display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:clamp(14px,2.5vw,28px)\">\n          <!-- inputs -->\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <div style=\"text-align:center;font-size:12px;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;color:#8A9A9D;margin-bottom:2px\">Your data<\u002Fdiv>\n            <div style=\"background:#F3F8F8;border:1px solid #D2E2E4;border-radius:12px;padding:11px 16px;font-size:14px;font-weight:600;color:#0E5366;text-align:center\">Order data<\u002Fdiv>\n            <div style=\"background:#F3F8F8;border:1px solid #D2E2E4;border-radius:12px;padding:11px 16px;font-size:14px;font-weight:600;color:#0E5366;text-align:center\">Production timeline<\u002Fdiv>\n            <div style=\"background:#F3F8F8;border:1px solid #D2E2E4;border-radius:12px;padding:11px 16px;font-size:14px;font-weight:600;color:#0E5366;text-align:center\">Backer &amp; preorder list<\u002Fdiv>\n          <\u002Fdiv>\n          <span aria-hidden=\"true\" style=\"font-size:26px;color:#C0CFD1;font-weight:300\">→<\u002Fspan>\n          <!-- tideover node -->\n          <div style=\"background:#0E5366;border-radius:18px;p 11px;align-items:flex-start;font-size:15px;line-height:1.55;color:#46585C\"><span style=\"color:#B5836A;flex:none;font-weight:700;margin-top:1px\">—<\u002Fspan>You ship in-stock orders within a few days.<\u002Fli>\n          <li style=\"display:flex;gap:11px;align-items:flex-start;font-size:15px;line-height:1.55;color:#46585C\"><span style=\"color:#B5836A;flex:none;font-weight:700;margin-top:1px\">—<\u002Fspan>You want to replace your whole helpdesk.<\u002Fli>\n          <li style=\"display:flex;gap:11px;align-items:flex-start;font-size:15px;line-height:1.55;color:#46585C\"><span style=\"color:#B5836A;flex:none;font-weight:700;margin-top:1px\">—<\u002Fspan>You sell regulated or supplement goods with timeline liability.<\u002Fli>\n          <li style=\"display:flex;gap:11px;align-items:flex-start;font-size:15px;line-height:1.55;color:#46585C\"><span style=\"color:#B5836A;flex:none;font-weight:700;margin-top:1px\">—<\u002Fspan>You only have a handful of orders to cover.<\u002Fli>\n          <li style=\"display:flex;gap:11px;align-items:flex-start;font-size:15px;line-height:1.55;color:#46585C\"><span style=\"color:#B5836A;flex:none;font-weight:700;margin-top:1px\">—<\u002Fspan>You want a bot that auto-fires delivery promises.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ OPERATOR ============ -->\n  <section id=\"operator\" style=\"background:linear-gradient(180deg,#FBF8F2 0%,#F3EEE2 100%)\">\n    <div style=\"max-width:900px;margin:0 auto;padding:clamp(56px,8vw,104px) 22px\">\n      <div style=\"text-transform:uppercase;letter-spacing:0.14em;font-size:13px;font-weight:700;color:{{ accent }};margin-bottom:14px\">The operator behind it<\u002Fdiv>\n      <blockquote style=\"margin:0 0 32px;border:0;padding:0\">\n        <p style=\"font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:clamp(22px,3vw,30px);line-height:1.32;color:#11252A;margin:0;text-wrap:pretty\">\"I ran a physical-goods company that did around <strong style=\"color:#0E5366\">$2M a year<\u002Fstrong> — our own warehouse, our own shipping, our own fulfillment. I spent years in the inbox writing the 'where's my order?' replies during long waits. I'm not a vendor who read about this problem. I lived it from your side of the counter.\"<\u002Fp>\n      <\u002Fblockquote>\n\n      <div style=\"background:#FFFFFF;border:1px solid #EBE2D0;border-radius:20px;padding:30px;box-shadow:0 12px 30px rgba(31,91,107,0.06)\">\n        <h3 style=\"font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:20px;font-weight:600;color:#11252A;margin:0 0 14px\">A plain-spoken proof pledge<\u002Fh3>\n        <p style=\"font-size:15.5px;line-height:1.62;color:#374A4F;margin:0 0 22px\">No invented metric. No fake testimonial. No borrowed logo. No unearned star rating. Every number on this page is a target measured against your own baseline — and the full refund-reduction case study lands only after a real cohort completes.<\u002Fp>\n        <div style=\"border:1.5px dashed #C9B79A;border-radius:14px;padding:20px 22px;background:#FBF6EC;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13.5px;color:#8A6B45;line-height:1.5\">[CASE STUDY PLACEHOLDER — refund-reduction delta, post first completed cohort]<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FAQ ============ -->\n  <section id=\"faq\" style=\"max-width:860px;margin:0 auto;padding:clamp(56px,8vw,104px) 22px\">\n    <div style=\"margin-bottom:36px\">\n      <div style=\"text-transform:uppercase;letter-spacing:0.14em;font-size:13px;font-weight:700;color:{{ accent }};margin-bottom:14px\">Questions<\u002Fdiv>\n      <h2 style=\"font-family:'Iowan Old Style',Palatino,Georgia,serif;font-weight:600;font-size:clamp(28px,3.6vw,40px);line-height:1.14;letter-spacing:-0.01em;color:#11252A;margin:0\">Answered plainly.<\u002Fh2>\n    <\u002Fdiv>\n    <div>\n      <details style=\"border-top:1px solid #EBE2D0\">\n        <summary style=\"cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;padding:22px 4px;font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:18.5px;font-weight:600;color:#0E5366\">Do I switch helpdesks or install anything?<span class=\"tgl\" aria-hidden=\"true\" style=\"flex:none;font-size:24px;font-weight:300;color:#D9762F;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 4px 24px;color:#4E5F63;font-size:15.5px;line-height:1.7;max-width:720px\">No. Tideover bolts onto the Gorgias, Tidio, or Intercom you already run. Nothing to rip out, no second inbox, no infra change — we work inside your existing setup and handle the presale tickets specifically.<\u002Fdiv>\n      <\u002Fdetails>\n      <details style=\"border-top:1px solid #EBE2D0\">\n        <summary style=\"cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;padding:22px 4px;font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:18.5px;font-weight:600;color:#0E5366\">How is this different from the bot already in my helpdesk?<span class=\"tgl\" aria-hidden=\"true\" style=\"flex:none;font-size:24px;font-weight:300;color:#D9762F;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 4px 24px;color:#4E5F63;font-size:15.5px;line-height:1.7;max-width:720px\">A generic bot doesn't know an order is a preorder, doesn't know its real production timeline, and answers a Day 80 panic the same as a Day 5 hello. Tideover is built only for the 60–120 day wait, with replies tied to where each order actually is.<\u002Fdiv>\n      <\u002Fdetails>\n      <details style=\"border-top:1px solid #EBE2D0\">\n        <summary style=\"cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;padding:22px 4px;font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:18.5px;font-weight:600;color:#0E5366\">Will you make promises you can't keep?<span class=\"tgl\" aria-hidden=\"true\" style=\"flex:none;font-size:24px;font-weight:300;color:#D9762F;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 4px 24px;color:#4E5F63;font-size:15.5px;line-height:1.7;max-width:720px\">Never. We use honest confidence bands — \"currently tracking for late July,\" not a hard date. Every novel reply is human-approved before it sends. A false delivery promise is the most damaging thing we could say, so we don't.<\u002Fdiv>\n      <\u002Fdetails>\n      <details style=\"border-top:1px solid #EBE2D0\">\n        <summary style=\"cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;padding:22px 4px;font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:18.5px;font-weight:600;color:#0E5366\">What does the free pilot involve?<span class=\"tgl\" aria-hidden=\"true\" style=\"flex:none;font-size:24px;font-weight:300;color:#D9762F;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 4px 24px;color:#4E5F63;font-size:15.5px;line-height:1.7;max-width:720px\">For one full presale cycle, we run your presale support by hand inside your helpdesk — timeline-aware, human-approved replies in two daily windows — and build a day-by-day reassurance playbook from your real tickets, measured against your baseline.<\u002Fdiv>\n      <\u002Fdetails>\n      <details style=\"border-top:1px solid #EBE2D0\">\n        <summary style=\"cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;padding:22px 4px;font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:18.5px;font-weight:600;color:#0E5366\">What can you prove, and what can't you yet?<span class=\"tgl\" aria-hidden=\"true\" style=\"flex:none;font-size:24px;font-weight:300;color:#D9762F;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 4px 24px;color:#4E5F63;font-size:15.5px;line-height:1.7;max-width:720px\">Right now we can show leading indicators — faster first response, fewer WISMO tickets, logged saves. The full refund-reduction delta needs a complete 60–120 day cycle to be real, so we report it after the first cohort finishes. We'd rather tell you that than invent a number.<\u002Fdiv>\n      <\u002Fdetails>\n      <details style=\"border-top:1px solid #EBE2D0\">\n        <summary style=\"cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;padding:22px 4px;font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:18.5px;font-weight:600;color:#0E5366\">What does it cost after the pilot?<span class=\"tgl\" aria-hidden=\"true\" style=\"flex:none;font-size:24px;font-weight:300;color:#D9762F;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 4px 24px;color:#4E5F63;font-size:15.5px;line-height:1.7;max-width:720px\">The pilot is free. On proof, it's roughly $199–$499/mo, scaling to $799–$999+/mo as volume grows. Any performance fee waits until there's a real case study to stand on.<\u002Fdiv>\n      <\u002Fdetails>\n      <details style=\"border-top:1px solid #EBE2D0;border-bottom:1px solid #EBE2D0\">\n        <summary style=\"cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:16px;padding:22px 4px;font-family:'Iowan Old Style',Palatino,Georgia,serif;font-size:18.5px;font-weight:600;color:#0E5366\">I'm a crowdfunding creator juggling backers and preorders — does that fit?<span class=\"tgl\" aria-hidden=\"true\" style=\"flex:none;font-size:24px;font-weight:300;color:#D9762F;line-height:1\">+<\u002Fspan><\u002Fsummary>\n        <div style=\"padding:0 4px 24px;color:#4E5F63;font-size:15.5px;line-height:1.7;max-width:720px\">That's exactly who this is for. Backers, late pledges, and new preorders all bring their own long waits, and Tideover handles that mixed presale load without you switching a thing.<\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- ============ FINAL CTA ============ -->\n  <section style=\"backgro customers over until their order ships.<\u002Fp>\n          <a href=\"https://tideover.app\" style=\"color:#E9B486;font-size:15px;font-weight:600;text-decoration:none\" style-hover=\"text-decoration:underline\">tideover.app<\u002Fa>\n        <\u002Fdiv>\n        <a href=\"{{ book_call }}\" style=\"display:inline-flex;align-items:center;gap:8px;background:linear-gradient(135deg,#E98F49 0%,#C9612C 100%);color:#FFF6EE;font-size:15px;font-weight:600;padding:13px 25px;border-radius:999px;text-decoration:none;box-shadow:0 10px 24px rgba(201,97,44,0.4);transition:transform .2s,background .2s,box-shadow .2s\" style-hover=\"transform:translateY(-2px);background:linear-gradient(135deg,#F59C53 0%,#D86E34 100%);box-shadow:0 16px 34px rgba(201,97,44,0.52)\">Get a free teardown<span aria-hidden=\"true\" style=\"font-size:1.05em;line-height:1\">→<\u002Fspan><\u002Fa>\n      <\u002Fdiv>\n      <p style=\"margin:24px 0 0;font-size:13.5px;line-height:1.6;color:#7E9B98;max-width:640px\">Every figure on this page is a target to measure against your own baseline — never a claimed result. We never make hard delivery promises; confidence bands only.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{\n  &quot;accentColor&quot;: {&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#D9762F&quot;,&quot;tsType&quot;:&quot;string&quot;},\n  &quot;pilotHeadline&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;We'll run your presale support by hand for one cycle. Free.&quot;,&quot;tsType&quot;:&quot;string&quot;},\n  &quot;finalHeadline&quot;: {&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;The tide always comes in. Their order is coming.&quot;,&quot;tsType&quot;:&quot;string&quot;}\n}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      book_call: '{{book_call}}',\n      first_strike_form: '{{first_strike_form}}',\n      accent: this.props.ac
