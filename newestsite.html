sition:transform .15s ease}\n  .link-quiet:hover .arrow{transform:translateX(4px)}\n\n  /* ============ TOP HUD / NAV ============ */\n  .nav{position:sticky;top:0;z-index:60;background:rgba(8,11,18,0.82);backdrop-filter:saturate(150%) blur(16px);-webkit-backdrop-filter:saturate(150%) blur(16px);border-bottom:1px solid var(--frame-soft);box-shadow:0 1px 0 rgba(0,0,0,0.5)}\n  .nav-inner{display:flex;align-items:center;justify-content:space-between;height:66px;gap:16px}\n  .brand{display:flex;align-items:center;gap:11px;text-decoration:none;color:var(--ink)}\n  .crest{filter:drop-shadow(0 0 8px rgba(94,200,230,0.45))}\n  .wordmark{font-weight:720;font-size:18px;letter-spacing:-0.03em}\n  /* player plate */\n  .plate{display:flex;align-items:center;gap:11px;padding:5px 12px 5px 8px;border:1px solid var(--frame-soft);border-radius:8px;background:linear-gradient(180deg,rgba(40,55,85,0.4),rgba(16,23,38,0.4))}\n  .lvl-ring{width:34px;height:34px;flex:none;border-radius:8px;border:1px solid var(--gold-dim);background:radial-gradient(circle at 50% 30%,rgba(227,199,120,0.18),rgba(16,23,38,0.6));display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;transition:transform .25s,box-shadow .25s}\n  .lvl-ring .t{font-family:var(--mono);font-size:7px;letter-spacing:0.1em;color:var(--gold);opacity:.8}\n  .lvl-ring .n{font-family:var(--mono);font-size:14px;font-weight:700;color:#fff}\n  .lvl-ring.flash{transform:scale(1.16);box-shadow:0 0 22px var(--gold-glow)}\n  .plate-bars{display:flex;flex-direction:column;gap:4px;width:120px}\n  .pb-row{display:flex;align-items:center;gap:7px}\n  .pb-lab{font-family:var(--mono);font-size:8px;letter-spacing:0.12em;color:var(--ink-mute);width:18px}\n  .pb-track{flex:1;height:6px;border-radius:4px;background:rgba(0,0,0,0.5);border:1px solid rgba(0,0,0,0.6);overflow:hidden;box-shadow:inset 0 1px 1px rgba(0,0,0,0.6)}\n  .pb-fill{height:100%;width:0;transition:width .14s linear}\n  .pb-fill.xp{background:linear-gradient(90deg,var(--gold-dim),var(--gold));box-shadow:0 0 10px var(--gold-glow)}\n  .pb-fill.hp{background:linear-gradient(90deg,#2E7E96,var(--equip));width:100%}\n  .nav-links{display:flex;align-items:center;gap:24px}\n  .nav-links a{color:var(--ink-soft);text-decoration:none;font-size:14px;font-weight:500}\n  .nav-links a:hover{color:#fff}\n  .nav-cta{display:flex;align-items:center;gap:14px}\n\n  /* cast-bar style scroll progress */\n  .castbar{position:sticky;top:66px;z-index:55;height:6px;background:rgba(0,0,0,0.55);overflow:hidden;border-bottom:1px solid rgba(0,0,0,0.5)}\n  .castbar::before{content:\"\";position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,transparent,transparent 38px,rgba(0,0,0,0.45) 38px,rgba(0,0,0,0.45) 40px);z-index:2;pointer-events:none}\n  .castfill{height:100%;width:0;background:linear-gradient(90deg,var(--equip-deep),var(--equip) 70%,#cdf3ff);box-shadow:0 0 14px var(--equip-glow);transition:width .12s linear}\n\n  /* ============ QUEST RAIL ============ */\n  .rail{position:fixed;left:24px;top:50%;transform:translateY(-50%);z-index:40;display:flex;flex-direction:column}\n  .rail-node{display:flex;align-items:center;gap:11px;text-decoration:none;height:42px;position:relative;color:var(--ink-mute)}\n  .rail-node::before{content:\"\";position:absolute;left:7px;top:-21px;height:21px;width:2px;background:var(--frame-soft)}\n  .rail-node:first-child::before{display:none}\n  .rail-tick{width:16px;height:16px;flex:none;background:var(--bg-1);border:2px solid var(--frame);transform:rotate(45deg);transition:all .3s ease;position:relative;z-index:2}\n  .rail-label{font-family:var(--mono);font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;opacity:0;transform:translateX(-6px);transition:all .25s ease;white-space:nowrap}\n  .rail-node:hover .rail-label{opacity:1;transform:none;color:var(--ink-soft)}\n  .rail-node.done .rail-tick{border-color:var(--gold);background:var(--gold);box-shadow:0 0 12px var(--gold-glow)}\n  .rail-node.done::before{background:var(--gold-dim)}\n  .rail-node.active .rail-tick{border-color:var(--equip);box-shadow:0 0 0 4px rgba(94,200,230,0.16),0 0 16px var(--equip-glow)}\n  .rail-node.active .rail-label{opacity:1;transform:none;color:#fff}\n  @media(max-width:1360px){.rail{display:none}}\n\n  /* ============ reveal ============ */\n  html.has-js .rv{opacity:0;transform:translateY(24px);transition:opacity .7s cubic-bezier(.2,.7,.2,1),transform .7s cubic-bezier(.2,.7,.2,1);transition-delay:calc(var(--i,0)*70ms)}\n  html.has-js .rv.in{opacity:1;transform:none}\n\n  /* ============ Quest-marker section header ============ */\n  .qhead{display:flex;align-items:center;gap:14px;margin-bottom:18px}\n  .qmarker{width:30px;height:30px;flex:none;position:relative;display:flex;align-items:center;justify-content:center}\n  .qmarker svg{filter:drop-shadow(0 0 7px var(--gold-glow))}\n  .qchip{display:flex;flex-direction:column;gap:2px}\n  .qchip .q{font-family:var(--mono);font-size:10.5px;letter-spacing:0.18em;text-transform:uppercase;color:var(--gold)}\n  .qchip .s{font-family:var(--mono);font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-mute)}\n\n  .lede{font-size:18.5px;color:var(--ink-soft);max-width:60ch;margin-top:18px;line-height:1.6}\n  .lede strong{color:var(--ink);font-weight:600}\n  .cu{font-family:var(--mono);font-variant-numeric:tabular-nums}\n\n  /* ============ HERO ============ */\n  .hero{padding:64px 0 30px}\n  .hero h1{font-size:clamp(33px,5.7vw,60px);line-height:1.03;letter-spacing:-0.03em;font-weight:740;max-width:18ch;margin:20px 0 0}\n  .hero h1 .equip{color:var(--equip);text-shadow:0 0 26px rgba(94,200,230,0.35)}\n  .kicker{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:12px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-soft);padding:6px 13px;border:1px solid var(--frame-soft);border-radius:7px;background:linear-gradient(180deg,rgba(40,55,85,0.4),rgba(16,23,38,0.4))}\n  .tagline{font-family:var(--mono);font-size:14px;letter-spacing:0.04em;color:var(--ink-soft);margin-top:20px;display:inline-flex;align-items:center;gap:12px;flex-wrap:wrap}\n  .tagline .sep{color:var(--gold)}\n  .hero-sub{font-size:18px;color:var(--ink-soft);max-width:50ch;margin-top:22px;line-height:1.55}\n  .hero-cta{display:flex;flex-wrap:wrap;align-items:center;gap:18px;margin-top:30px}\n  .norisk{margin-top:18px;font-size:14px;color:var(--ink-mute);display:flex;align-items:flex-start;gap:9px;max-width:62ch}\n  .norisk svg{flex:none;margin-top:3px;color:var(--equip)}\n\n  /* ============ EQUIPMENT SLOTS (4 terms) ============ */\n  .gear{margin-top:54px}\n  .gear-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--frame-soft)}\n  .slot-item{position:relative;background:linear-gradient(180deg,rgba(20,29,47,0.7),rgba(11,17,29,0.8));padding:18px;cursor:default;transition:background .2s,box-shadow .2s;overflow:hidden}\n  .slot-item::before{content:\"\";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--rare,var(--equip))}\n  .slot-item:hover{background:linear-gradient(180deg,rgba(28,40,64,0.85),rgba(14,21,35,0.9));box-shadow:inset 0 0 0 1px color-mix(in srgb,var(--rare) 40%,transparent),inset 0 0 30px -8px var(--rare)}\n  .slot-head{display:flex;align-items:center;gap:11px}\n  .slot-ic{width:40px;height:40px;flex:none;border-radius:8px;border:1px solid color-mix(in srgb,var(--rare) 45%,transparent);background:radial-gradient(circle at 50% 30%,color-mix(in srgb,var(--rare) 22%,transparent),rgba(11,17,29,0.7));display:flex;align-items:center;justify-content:center;color:var(--rare,var(--equip));box-shadow:0 0 16px -6px var(--rare)}\n  .slot-rare{font-family:var(--mono);font-size:9.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--rare,var(--equip))}\n  .slot-name{font-size:16px;font-weight:680;letter-spacing:-0.02em;margin-top:3px}\n  .slot-rule{height:1px;background:var(--frame-soft);margin:13px 0}\n  .slot-stat{font-size:13.5px;color:var(--ink-soft);line-height:1.5}\n  .slot-flavor{font-size:12.5px;color:color-mix(in srgb,var(--rare,var(--equip)) 72%,#9aa3b2);font-style:italic;margin-top:10px;line-height:1.45}\n\n  /* ============ generic section ============ */\n  .section{padding:88px 0;border-top:1px solid var(--frame-soft)}\n\n  /* ============ Fatigue ============ */\n  .fatigue-grid{display:grid;grid-template-columns:1.05fr 1fr;gap:46px;align-items:center;margin-top:42px}\n  .fatigue-points{margin-top:24px;display:flex;flex-direction:column;gap:14px;max-width:46ch}\n  .fpt{display:flex;gap:13px;font-size:15.5px;color:var(--ink-soft)}\n  .fpt b{color:var(--ink);font-weight:600}\n  .fpt .mk{flex:none;width:24px;height:24px;border:1px solid rgba(242,102,107,0.4);display:flex;align-items:center;justify-content:center;color:var(--danger);font-family:var(--mono);font-size:11px;margin-top:1px;transform:rotate(45deg)}\n  .fpt .mk span{transform:rotate(-45deg)}\n  .chart-inner{padding:16px}\n  .chart-head{display:flex;align-items:center;justify-content:space-between;font-family:var(--mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:6px}\n  .enemy-hp{display:flex;align-items:center;gap:9px;margin-top:14px;font-family:var(--mono);font-size:10.5px;color:var(--ink-mute);letter-spacing:.1em;text-transform:uppercase}\n  .ehp-track{flex:1;height:11px;background:rgba(0,0,0,0.55);border:1px solid rgba(0,0,0,0.6);overflow:hidden;box-shadow:inset 0 1px 2px rgba(0,0,0,0.6);position:relative}\n  .ehp-track::after{content:\"\";position:absolute;inset:0;background-image:repeating-linear-gradient(90deg,transparent,transparent 24px,rgba(0,0,0,0.4) 24px,rgba(0,0,0,0.4) 25px)}\n  .ehp-fill{height:100%;width:28%;background:linear-gradient(90deg,var(--danger),#ff9a5b);box-shadow:0 0 12px rgba(242,102,107,.4);transition:width 1.4s cubic-bezier(.2,.8,.2,1)}\n\n  /* ============ Loadout ============ */\n  .loadout{margin-top:42px}\n  .loadout-bar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 18px;border-bottom:1px solid var(--frame-soft);font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-mute);flex-wrap:wrap}\n  .loadout-bar .pill{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--frame-soft);border-radius:100px;padding:4px 12px;color:var(--ink-soft)}\n  .angles{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--frame-soft)}\n  .angle{background:linear-gradient(180deg,rgba(16,23,38,0.7),rgba(10,15,26,0.8));padding:18px;transition:background .25s}\n  .angle:hover{background:linear-gradient(180deg,rgba(24,34,54,0.8),rgba(12,18,30,0.85))}\n  .angle-id{font-family:var(--mono);font-size:11px;letter-spacing:0.1em;color:var(--epic);text-transform:uppercase}\n  .angle-h{font-size:15.5px;font-weight:680;letter-spacing:-0.01em;margin-top:8px}\n  .angle-sub{font-size:13px;color:var(--ink-mute);margin-top:5px;line-height:1.45}\n  .slots{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:16px}\n  .slot{aspect-ratio:1/1;border:1px solid var(--frame-soft);background:linear-gradient(180deg,rgba(28,38,58,0.5),rgba(10,15,26,0.6));display:flex;align-items:flex-end;padding:6px;font-family:var(--mono);font-size:9px;color:var(--ink-mute);position:relative;transition:transform .15s,border-color .15s,box-shadow .15s;box-shadow:inset 0 1px 0 rgba(190,220,255,0.06)}\n  .slot::before{content:\"\";position:absolute;top:6px;left:6px;right:6px;height:1px;background:rgba(190,220,255,0.06)}\n  .slot:hover{transform:translateY(-3px) scale(1.05);border-color:var(--equip);box-shadow:0 8px 20px -10px var(--equip-glow),inset 0 0 14px -4px var(--equip-glow);z-index:2;color:var(--equip)}\n  .slot.crit{border-color:rgba(244,162,59,0.6);background:linear-gradient(180deg,rgba(244,162,59,0.16),rgba(20,15,8,0.6));color:var(--crit);animation:critpulse 2.4s ease-in-out infinite}\n  @keyframes critpulse{0%,100%{box-shadow:0 0 0 0 rgba(244,162,59,0)}50%{box-shadow:0 0 22px -4px var(--crit-glow),inset 0 0 14px -4px var(--crit-glow)}}\n  .loadout-note{padding:16px 18px;border-top:1px solid var(--frame-soft);font-size:13.5px;color:var(--ink-mute);line-height:1.55}\n  .loadout-note b{color:var(--ink-soft);font-weight:600}\n\n  /* ============ First Strike ============ */\n  .firststrike{border-top:1px solid var(--frame-soft);background:radial-gradient(900px 400px at 16% 0%,rgba(244,162,59,0.10),transparent 64%)}\n  .legendary-tag{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:var(--crit);border:1px solid rgba(244,162,59,0.45);background:rgba(244,162,59,0.08);padding:5px 12px;border-radius:7px}\n  .fs-card{margin-top:40px;border-color:rgba(244,162,59,0.4)!important;display:grid;grid-template-columns:1fr 1fr;gap:0}\n  .fs-card .win-title{color:var(--crit);background:linear-gradient(180deg,rgba(244,162,59,0.16),transparent)}\n  .fs-card .win-title .gem{background:var(--crit);box-shadow:0 0 9px var(--crit-glow)}\n  .fs-grid{display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:center;padding:30px}\n  .steps{display:flex;flex-direction:column}\n  .step{display:flex;gap:15px;padding:14px 0;border-bottom:1px solid var(--frame-soft)}\n  .step:last-child{border-bottom:none}\n  .step .n{flex:none;width:34px;height:34px;border:1px solid rgba(244,162,59,0.5);color:var(--crit);font-family:var(--mono);font-size:13px;display:flex;align-items:center;justify-content:center;font-weight:600;background:rgba(244,162,59,0.07);transform:rotate(45deg)}\n  .step .n span{transform:rotate(-45deg)}\n  .step b{display:block;font-size:15px;font-weight:600;margin-bottom:3px}\n  .step span.t{font-size:14px;color:var(--ink-soft);line-height:1.5}\n  .fs-cta{display:flex;flex-direction:column;align-items:flex-start;gap:14px;border-left:1px solid var(--frame-soft);padding-left:36px}\n  .fs-cta .h{font-size:22px;font-weight:700;letter-spacing:-0.02em;line-height:1.15}\n  .fs-cta p{font-size:14px;color:var(--ink-soft)}\n\n  /* ============ Paths / classes ============ */\n  .paths{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:42px}\n  .path{padding:0;display:flex;flex-direction:column;transition:transform .2s,box-shadow .2s}\n  .path:hover{transform:translateY(-4px)}\n  .knight:hover{box-shadow:0 0 0 1px rgba(0,0,0,0.55),inset 0 1px 0 rgba(190,220,255,0.10),0 26px 60px -30px var(--equip-glow)}\n  .forge:hover{box-shadow:0 0 0 1px rgba(0,0,0,0.55),inset 0 1px 0 rgba(190,220,255,0.10),0 26px 60px -30px var(--epic-glow)}\n  .path-body{padding:24px;display:flex;flex-direction:column;flex:1}\n  .class-row{display:flex;align-items:center;gap:13px}\n  .class-emblem{width:46px;height:46px;flex:none;border:1px solid var(--frame);display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 30%,rgba(40,55,85,0.6),rgba(11,17,29,0.7));transform:rotate(45deg)}\n  .class-emblem svg{transform:rotate(-45deg)}\n  .knight .class-emblem{color:var(--equip);box-shadow:0 0 22px -8px var(--equip-glow)}\n  .forge .class-emblem{color:var(--epic);box-shadow:0 0 22px -8px var(--epic-glow)}\n  .path-tag{font-family:var(--mono);font-size:10.5px;letter-spacing:0.14em;text-transform:uppercase;color:var(--ink-mute)}\n  .path h3{font-size:22px;margin-top:3px;letter-spacing:-0.025em}\n  .path .quip{font-size:15px;font-weight:600;margin-top:14px}\n  .knight .quip{color:var(--equip)}\n  .forge .quip{color:var(--epic)}\n  .path p{font-size:14.5px;color:var(--ink-soft);margin-top:12px;line-height:1.58}\n  .path .foot{margin-top:auto;padding-top:22px}\n  .path .meta{font-family:var(--mono);font-size:11px;color:var(--ink-mute);letter-spacing:0.04em;margin-top:14px;display:flex;align-items:center;gap:8px}\n\n  /* ============ Guarantee ============ */\n  .guarantee{border-top:1px solid var(--frame-soft)}\n  .buff-tag{display:inline-flex;align-items:center;gap:9px;font-family:var(--mono);font-size:11px;letter-spacing:0.14em;text-transform:uppercase;color:var(--buff);border:1px solid rgba(124,224,176,0.4);background:rgba(124,224,176,0.07);padding:5px 12px;border-radius:7px}\n  .quote{margin-top:34px;padding:0}\n  .quote .win-title{color:var(--buff);background:linear-gradient(180deg,rgba(124,224,176,0.12),transparent)}\n  .quote .win-title .gem{background:var(--buff);box-shadow:0 0 9px rgba(124,224,176,.5)}\n  .quote-body{padding:28px 32px;position:relative}\n  .quote-body::before{content:\"\";position:absolute;left:0;top:24px;bottom:24px;width:3px;background:var(--buff);box-shadow:0 0 16px rgba(124,224,176,.5)}\n  .quote-body p{font-size:18.5px;line-height:1.62;color:var(--ink);letter-spacing:-0.01em;padding-left:18px}\n  .quote-body .em{color:var(--buff);font-weight:600}\n  .guar-pts{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:24px}\n  .gpt{padding:20px}\n  .gpt .l{font-family:var(--mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--buff);display:flex;align-items:center;gap:8px}\n  .gpt p{font-size:14px;color:var(--ink-soft);margin-top:11px;line-height:1.5}\n\n  /* ============ Proof ============ */\n  .proof-grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;margin-top:40px;align-items:stretch}\n  .proof-card{padding:26px}\n  .proof-card .l{font-family:var(--mono);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink-mute);margin-bottom:14px}\n  .num-honest{display:flex;align-items:baseline;gap:14px}\n  .num-honest .v{font-family:var(--mono);font-size:46px;font-weight:600;letter-spacing:-0.02em;color:var(--gold);text-shadow:0 0 20px var(--gold-glow)}\n  .num-honest .u{font-size:14px;color:var(--ink-soft)}\n  .num-note{font-size:13px;color:var(--ink-mute);margin-top:14px;line-height:1.5}\n  .placeholder-block{margin-top:22px;border:1px dashed var(--frame);background:repeating-linear-gradient(135deg,transparent,transparent 11px,rgba(190,220,255,0.02) 11px,rgba(190,220,255,0.02) 22px);padding:30px;text-align:center;border-radius:5px}\n  .placeholder-block .tag{font-family:var(--mono);font-size:13px;letter-spacing:0.14em;color:var(--gold);text-transform:uppercase}\n  .placeholder-block p{font-size:14px;color:var(--ink-mute);margin-top:12px;max-width:60ch;margin-inline:auto;line-height:1.55}\n\n  /* ============ FAQ ============ */\n  .faq{margin-top:36px}\n  details{border-bottom:1px solid var(--frame-soft)}\n  details:first-child{border-top:1px solid var(--frame-soft)}\n  summary{list-style:none;cursor:pointer;padding:20px 16px;display:flex;align-items:center;gap:14px;font-size:17px;font-weight:600;letter-spacing:-0.02em;transition:color .15s,background .15s}\n  summary:hover{color:#fff;background:rgba(40,55,85,0.18)}\n  summary::-webkit-details-marker{display:none}\n  summary .qm{flex:none;width:18px;height:18px;color:var(--gold);transform:rotate(45deg);border:1px solid var(--gold-dim);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px}\n  summary .qm span{transform:rotate(-45deg)}\n  summary .txt{flex:1}\n  summary .pm{flex:none;width:22px;height:22px;position:relative;color:var(--ink-mute);transition:color .15s}\n  summary:hover .pm{color:var(--equip)}\n  summary .pm::before,summary .pm::after{content:\"\";position:absolute;background:currentColor;border-radius:2px}\n  summary .pm::before{left:4px;right:4px;top:10px;height:2px}\n  summary .pm::after{top:4px;bottom:4px;left:10px;width:2px;transition:transform .2s,opacity .2s}\n  details[open] summary .pm::after{transform:scaleY(0);opacity:0}\n  details[open] summary{color:#fff;background:rgba(40,55,85,0.12)}\n  .faq-a{padding:0 16px 22px 48px;font-size:15px;color:var(--ink-soft);max-width:80ch;line-height:1.62}\n  .faq-a b{color:var(--ink)}\n\n  /* ============ Final ============ */\n  .final{border-top:1px solid var(--frame-soft);text-align:center;background:radial-gradient(720px 360px at 50% 120%,rgba(94,20  = Math.min(1,(ts-start)/dur); var e = 1-Math.pow(1-t,3); el.textContent = Math.round(to*e)+suffix; if(t<1) requestAnimationFrame(step); }\n    requestAnimationFrame(step);\n  }\n  var cus = [].slice.call(document.querySelectorAll('.cu'));\n  var hp = document.getElementById('hpFill');\n  var hpDone = false;\n  var railNodes = [].slice.call(document.querySelectorAll('.rail-node'));\n  var questEls = [].slice.call(document.querySelectorAll('[data-quest]'));\n\n  var toasts = document.getElementById('toasts');\n  var lvlRing = document.getElementById('lvlRing');\n  var lvlNum = document.getElementById('lvlNum');\n  var level = 1;\n  var icons = {\n    'gold':'<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 3l2.5 5.2 5.5.7-4 3.9 1 5.5L12 15.6 6.9 18.3l1-5.5-4-3.9 5.5-.7z\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linejoin=\"round\"/><\u002Fsvg>',\n    '':'<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 3l2.5 5.2 5.5.7-4 3.9 1 5.5L12 15.6 6.9 18.3l1-5.5-4-3.9 5.5-.7z\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linejoin=\"round\"/><\u002Fsvg>',\n    'crit':'<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M13 2 4 14h6l-1 8 9-12h-6z\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linejoin=\"round\"/><\u002Fsvg>',\n    'epic':'<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2 22 8.5v7L12 22 2 15.5v-7z\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linejoin=\"round\"/><\u002Fsvg>',\n    'danger':'<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 3 22 20H2z\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linejoin=\"round\"/><path d=\"M12 9v5M12 16.5v.5\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\"/><\u002Fsvg>',\n    'buff':'<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\"><path d=\"M12 2 19 5v6c0 4.5-3 7.6-7 9-4-1.4-7-4.5-7-9V5z\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linejoin=\"round\"/><path d=\"m9 11 2 2 4-4.5\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/><\u002Fsvg>'\n  };\n  function flashLevel(){ level++; lvlNum.textContent = level; if(reduce) return; lvlRing.classList.add('flash'); setTimeout(function(){ lvlRing.classList.remove('flash'); }, 380); }\n  function toast(o){\n    var rare = o.rare || '';\n    var el = document.createElement('div');\n    el.className = 'toast' + (rare ? ' rare-'+rare : '');\n    el.innerHTML = '<div class=\"toast-ic\">'+(icons[rare]||icons[''])+'<\u002Fdiv><div class=\"toast-body\"><div class=\"toast-k\">'+o.kicker+'<\u002Fdiv><div class=\"toast-t\">'+o.title+'<\u002Fdiv><\u002Fdiv>'+(o.xp?'<div class=\"toast-xp\">+'+o.xp+'<\u002Fdiv>':'');\n    toasts.appendChild(el);\n    requestAnimationFrame(function(){ requestAnimationFrame(function(){ el.classList.add('show'); }); });\n    setTimeout(function(){ el.classList.remove('show'); setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 500); }, 3400);\n    while(toasts.children.length > 4){ toasts.removeChild(toasts.firstChild); }\n  }\n  var fired = {};\n\n  function vh(){ return window.innerHeight || root.clientHeight || 800; }\n  var ticking = false;\n  function update(){\n    ticking = false;\n    var H = vh();\n    var max = root.scrollHeight - root.clientHeight;\n    var sc = window.pageYOffset || root.scrollTop || document.body.scrollTop || 0;\n    var p = max > 0 ? sc/max : 0;\n    var w = Math.min(100, Math.max(0, p*100)).toFixed(2) + '%';\n    if(castfill) castfill.style.width = w;\n    if(xpPlate) xpPlate.style.width = w;\n    if(!reduce){\n      for(var i=0;i<rvs.length;i++){ var el=rvs[i]; if(!el.__in && el.getBoundingClientRect().top < H*0.92){ el.classList.add('in'); el.__in=true; (function(node){ setTimeout(function(){ node.style.opacity='1'; node.style.transform='none'; }, 820); })(el); } }\n    }\n    for(var j=0;j<cus.length;j++){ var c=cus[j]; if(!c.__done && c.getBoundingClientRect().top < H*0.85){ c.__done=true; countUp(c); } }\n    if(hp && !hpDone){ var hr=hp.getBoundingClientRect(); if(hr.top < H*0.85 && hr.bottom > 0){ hpDone=true; if(reduce){ hp.style.width='28%'; } else { hp.style.width='100%'; setTimeout(function(){ hp.style.width='28%'; }, 120); } } }\n    for(var k=0;k<questEls.length;k++){ var q=questEls[k]; var key=q.getAttribute('data-quest'); if(fired[key]) continue; var qr=q.getBoundingClientRect(); if(qr.top < H*0.62 && qr.bottom > 0){ fired[key]=true; toast({ kicker:q.getAttribute('data-kicker')||'Quest update', title:key, rare:q.getAttribute('data-rare')||'', xp:parseInt(q.getAttribute('data-xp'),10)||0 }); flashLevel(); } }\n    var activeIdx = -1;\n    for(var r=0;r<railNodes.length;r++){ var id=(railNodes[r].getAttribute('href')||'').replace('#',''); var sec=document.getElementById(id); if(sec && sec.getBoundingClientRect().top <= H*0.42){ activeIdx=r; } }\n    for(var s2=0;s2<railNodes.length;s2++){ railNodes[s2].classList.toggle('active', s2===activeIdx); railNodes[s2].classList.toggle('done', s2<activeIdx); }\n  }\n  function onScroll(){ if(ticking) return; ticking=true; requestAnimationFrame(update); }\n  window.addEventListener('scroll', onScroll, {passive:true});\n  window.addEventListener('resize', onScroll);\n  update();\n  var safetyTicks = 0;\n  var safetyIv = setInterval(function(){ update(); if(++safetyTicks > 10) clearInterval(safetyIv); }, 320);\n\n  document.addEventListener('click', function(ev){\n    var a = ev.target.closest ? ev.target.closest('[data-xp]') : null;\n    if(!a) return; var amt = a.getAttribute('data-xp'); if(!amt || reduce) return;\n    var f = document.createElement('div'); f.className='xpfloat'; f.textContent='+'+amt+' XP';\n    f.style.left = ev.clientX+'px'; f.style.top = (ev.clientY-10)+'px';\n    document.body.appendChild(f); setTimeout(function(){ if(f.parentNode) f.parentNode.removeChild(f); }, 1000);\n  }, true);\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
